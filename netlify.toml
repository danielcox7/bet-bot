# This file configures Netlify for your project.
# For more information, see https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build" # The command to build your frontend for production
  publish = "dist"          # The directory where your built frontend assets are placed

[dev]
  command = "npm run dev"   # The command to start your local development server (e.g., Vite)
  port = 8888               # The port Netlify Dev will run on
  targetPort = 5173         # The default port your local development server (Vite) runs on
  functions = "netlify/functions" # The directory where your Netlify Functions are located